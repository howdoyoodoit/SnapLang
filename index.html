
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Vocabulary App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 data-i18n="appTitle">Korean Vocabulary App</h1>
        <div class="header-right">
            <button id="theme-toggle" title="Toggle Dark/Light Mode">🌓</button>
            <div class="settings-container">
                <select id="language-selector"></select>
            </div>
        </div>
    </header>

    <nav id="tab-nav">
        <button class="tab-link active" data-tab="flashcards" data-i18n="tabFlashcards">Flashcards</button>
        <button class="tab-link" data-tab="quiz" data-i18n="tabQuiz">Quiz</button>
        <button class="tab-link" data-tab="vocabulary" data-i18n="tabVocabulary">Vocabulary</button>
    </nav>

    <main id="app-container">
        <!-- How to Use Section -->
        <section id="how-to-use" class="info-section">
            <h2 data-i18n="howToUseTitle">How to Use</h2>
            <ul>
                <li data-i18n="howToUseStep1">Flashcards: Click the card to flip. Use Prev/Next to navigate.</li>
                <li data-i18n="howToUseStep2">Quiz: Test your knowledge. Review missed words at the end.</li>
                <li data-i18n="howToUseStep3">Vocabulary: Search and filter words by category or favorites.</li>
            </ul>
            <button id="close-how-to-use" class="small-btn">×</button>
        </section>

        <!-- Flashcards Section -->
        <section id="flashcards" class="tab-content active">
            <div id="flashcard-container"></div>
            <div class="flashcard-nav">
                <button id="prev-word" data-i18n="prevButton">Prev</button>
                <button id="next-word" data-i18n="nextButton">Next</button>
            </div>
        </section>

        <!-- Quiz Section -->
        <section id="quiz" class="tab-content">
            <div id="quiz-container"></div>
            <button id="start-quiz" data-i18n="startQuizButton">Start Quiz</button>
						<button id="review-wrong-answers" data-i18n="reviewWrongAnswers" style="display: none;"></button>
        </section>

        <!-- Vocabulary List Section -->
        <section id="vocabulary" class="tab-content">
            <div class="filters">
                <input type="text" id="search-bar" placeholder="Search..." data-i18n-placeholder="searchPlaceholder">
                <select id="category-filter">
                    <option value="all" data-i18n="allCategories">All Categories</option>
                </select>
                <button id="favorites-filter" data-i18n="showFavorites">Show Favorites</button>
            </div>
            <div id="vocabulary-list"></div>
        </section>
    </main>

    <template id="flashcard-template">
        <div class="flashcard">
            <div class="flashcard-inner">
                <div class="flashcard-front">
                    <div class="word-info">
                        <h2 class="korean-word"></h2>
                        <p class="romanization"></p>
                    </div>
                    <div class="card-actions">
                        <button class="pronounce-btn" title="Pronounce">🔊</button>
                        <button class="favorite-btn" title="Favorite">☆</button>
                    </div>
                    <p class="example-sentence-korean"></p>
                </div>
                <div class="flashcard-back">
                    <h3 class="meaning"></h3>
                    <p class="example-sentence-translation"></p>
                </div>
            </div>
        </div>
    </template>

    <script src="vocabulary_data.js"></script>
    <script src="app.js"></script>
</body>22
</html>
